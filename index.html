<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Maquette Interactive - Arts Appliqués</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* En-tête sobre et minimaliste (Style Galerie d'Art / Noir & Blanc) */
        .site-header {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
            animation: fadeIn 0.8s ease-out;
        }
        .site-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        .site-header p {
            margin: 4px 0 0 0;
            font-size: 0.8rem;
            color: #888888;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .site-header p::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 6px #ffffff;
        }

        /* Fenêtre d'informations - Style Épuré Premium, optimisée Tablettes */
        #info-box {
            position: absolute;
            top: 30px;
            right: -380px; /* Masqué par défaut */
            width: 340px;
            max-height: calc(100vh - 60px);
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #info-box.active {
            right: 30px;
        }
        #info-title {
            margin: 0 0 16px 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.4;
            letter-spacing: -0.2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }
        #info-description {
            margin: 0 0 24px 0;
            font-size: 0.88rem;
            color: #cccccc;
            line-height: 1.6;
            font-weight: 300;
        }
        
        /* Liens intégrés sobres */
        #info-description a {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }
        #info-description a:hover {
            background: rgba(255, 255, 255, 0.2) !important;
            color: #ffffff !important;
        }

        /* Bouton de fermeture Noir & Blanc */
        #close-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.2s;
            margin-top: auto;
        }
        #close-btn:hover {
            background: #dddddd;
        }
        #close-btn:active {
            transform: scale(0.98);
        }

        /* Animation d'apparition */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================================================
           FLEXIBILITÉ ET RESPONSIVE : ADAPTATION TABLETTES ET MOBILES
           ========================================================================= */
        @media (max-width: 1024px) { /* Cible spécifiquement les tablettes (iPad, Galaxy Tab...) */
            .site-header {
                top: 24px;
                left: 24px;
            }
            #info-box {
                width: 300px;
                padding: 24px;
                top: 24px;
            }
            #info-box.active {
                right: 24px;
            }
        }

        @media (max-width: 480px) { /* Cible les smartphones */
            .site-header h1 { font-size: 1.2rem; }
            #info-box {
                right: -100%;
                width: calc(100% - 40px);
                left: 20px;
                top: auto;
                bottom: -100%;
                max-height: 45vh;
                transition: bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            }
            #info-box.active {
                bottom: 20px;
                right: 20px;
            }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div class="site-header">
        <h1>Maquette Interactive</h1>
        <p>Cours d'Art Appliqué</p>
    </div>

    <div id="canvas-container"></div>

    <div id="info-box">
        <h2 id="info-title">Nom de l'objet</h2>
        <div id="info-description">Description...</div>
        <button id="close-btn">Fermer</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
