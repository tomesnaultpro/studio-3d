<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mon Studio 3D Interactif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d0d11;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Titre principal discret en haut à gauche */
        .site-header {
            position: absolute;
            top: 25px;
            left: 25px;
            color: white;
            z-index: 10;
            pointer-events: none;
        }
        .site-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .site-header p {
            margin: 4px 0 0 0;
            font-size: 0.8rem;
            color: #7e7e8c;
            font-weight: 300;
        }

        /* Fenêtre d'informations style "Glassmorphism" futuriste */
        #info-box {
            position: absolute;
            top: 25px;
            right: -350px; /* Caché par défaut à droite */
            width: 320px;
            background: rgba(18, 18, 24, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #info-box.active {
            right: 25px; /* Glisse vers l'intérieur quand activé */
        }
        #info-title {
            margin: 0 0 12px 0;
            font-size: 1.3rem;
            font-weight: 600;
            color: #00d2ff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }
        #info-description {
            margin: 0 0 20px 0;
            font-size: 0.9rem;
            color: #d1d1d6;
            line-height: 1.5;
            font-weight: 300;
        }
        #close-btn {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 8px;
            width: 100%;
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }
        #close-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        #close-btn:active {
            transform: translateY(0);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div class="site-header">
        <h1>Mon Studio 3D</h1>
        <p>Cliquez sur les éléments pour interagir</p>
    </div>

    <div id="canvas-container"></div>

    <div id="info-box">
        <h2 id="info-title">Nom de l'objet</h2>
        <p id="info-description">Description...</p>
        <button id="close-btn">Fermer</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
